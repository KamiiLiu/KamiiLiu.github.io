<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button id="btnXHR1">XHR -  AppleProduct.json</button>
    <button id="btnXHR2">XHR -  ipadair2022.json</button>

    <div id="msg"></div>
    <script>
        const urlAppleProduct = "https://raw.githubusercontent.com/apprunner/FileStorage/master/AppleProduct.json";
        const urlIpadAir = "https://raw.githubusercontent.com/apprunner/FileStorage/master/iPadAir2022.json";

        let ipadObject =[];
        let ipadArray = [];

        let xhr = new XMLHttpRequest();

        window.onload = function () {
            let btnXHR1 = document.getElementById("btnXHR1");
            let btnXHR2 = document.getElementById("btnXHR2");

            let msg = document.getElementById("msg");

            btnXHR1.addEventListener("click", function () {
                xhr.onload = function () {
                    console.log(this);
                    ipadObject = JSON.parse(this.responseText);

                    let color = "太空灰色", storage = "256GB", network = "Wi-Fi";

                    let ipad = ipadObject.ipad.ipadair.filter(item => item.color == color &&
                        item.storage == storage && item.network == network)[0];

                    msg.innerText = `${ipad.id}, ${ipad.color}, ${ipad.storage}, ${ipad.network},${ipad.price}`;
                }

                xhr.open("GET", urlAppleProduct);   //1

                xhr.send();  //2
            });

            btnXHR2.addEventListener("click", function () {
                xhr.onload = function () {
                    console.log(this);
                    //ipadArray = JSON.parse(this.responseText);
                    
                    ipadArray = this.response;

                    let color = "玫瑰金色", storage = "256GB", network = "Cellular";

                    let ipad = ipadArray.filter(item => item.color == color &&
                        item.storage == storage && item.network == network)[0];

                    msg.innerText = `${ipad.id}, ${ipad.color}, ${ipad.storage}, ${ipad.network},${ipad.price}`;
                }

                xhr.open("GET", urlIpadAir);   //1

                xhr.responseType="json";    
                
                xhr.send();  //2
            });

        }


    </script>
</body>

</html>
