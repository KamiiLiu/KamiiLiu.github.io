<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>fetch vs. async</h1>
    <button id="fetch">fetch</button>
    <button id="async">async</button>
    <button id="async2">async2</button>
    <button id="reset">reset</button>
    <div id="msg"></div>
    <div id="container"></div>

    <script>
        //Ex

        async function hello() {
            return greeting = await Promise.resolve("Hello");
        }

        hello().then(console.log);

    </script>
    <script>

        let btn1, btn2, btn3, reset, msg, container;
        window.onload = function () {
            btn1 = document.getElementById("fetch");
            btn1.addEventListener("click", fetchImage.bind(event, urlAatrox));

            btn2 = document.getElementById("async");
            btn2.addEventListener("click", asyncImage);

            btn3 = document.getElementById("async2");
            btn3.addEventListener("click", getAsyncImage);

            msg = document.getElementById("msg");
            container = document.getElementById("container");

            btnReset = document.getElementById("reset");
            btnReset.addEventListener("click", function () {
                container.innerHTML = "";
                msg.innerHTML = "";
            });
        }

        const urlAatrox = "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Aatrox_0.jpg";

        //pass parameter to addeventlistener -- https://www.codegrepper.com/code-examples/javascript/pass+parameter+to+addeventlistener
        //Ex1
        function fetchImage(url) {
            console.log(event);
            console.dir(event.target);
            console.log(`event:${event}, target:${event.target}`);
            console.log(`event:${event.constructor.name}, type:${event.type}, target :${event.target.tagName}`)
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    return response.blob();
                })
                .then(myBlog => {
                    let objectURL = URL.createObjectURL(myBlog);
                    let img = document.createElement("img");
                    img.src = objectURL;
                    container.appendChild(img);
                    msg.innerHTML = "<h3>完成fetch非同步作業</h3>";
                })
                .catch(ex => {
                    console.log('There has been a problem with your fetch operation: ' + ex.message);
                });
        }

        //Ex2
        let urlAhri = "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Ahri_0.jpg";
        async function fetchasyncImage(url) {
            let response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            let myBlob = await response.blob();

            let objectURL = URL.createObjectURL(myBlob);
            let img = document.createElement("img");
            img.src = objectURL;
            container.appendChild(img);
            msg.innerHTML = "<h3>完成async非同步作業</h3>";
        }

        function asyncImage() {
            fetchasyncImage(urlAhri)
                .catch(ex => { 
                    msg.innerHTML = `<h3>async非同步作業發生錯誤:${ex}</h3>`;
                 });    
        }

        //Ex3
        let urlAkali = "https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Akali_0.jpg";
        async function asyncImage2(url, datatype) {
            let response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            let content;
            switch(datatype.toLowerCase()){
                case "blob":
                    content = await response.blob();
                    break;
                case "json":
                    content = await response.json();
                    break;
                default:
                    content = await response.text();
                    break;
            }

            return content;
        }

        function getAsyncImage(){
            asyncImage2(urlAkali, "blob")
                .then(result => {
                    let objectURL = URL.createObjectURL(result);
                    let img = document.createElement("img");
                    img.src = objectURL;
                    container.appendChild(img);
                    msg.innerHTML = "<h3>完成async非同步作業2</h3>";
                })
                .catch(ex=>{
                    msg.innerHTML = `<h3>async非同步作業發生錯誤:${ex}</h3>`;
                });
        }
        

    </script>
</body>

</html>
