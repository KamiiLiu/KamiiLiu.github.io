<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --wid: 1200px;
            --base:#ccc;
        }

        .wrap {
            width: var(--wid);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid #000;
        }

        .item {
            box-sizing: border-box;
            width: 100px;
            height: 50px;
            background-color:var(--base);
            border: 1px solid #000;
        }

        img {
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>



</body>

</html>
